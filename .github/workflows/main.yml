name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        java: [ '17' ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    name: Build on ${{ matrix.os }} / JDK ${{ matrix.java }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      # Chỉ Linux mới cần virtual display
      - name: Install virtual display (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      # Linux — dùng xvfb-run
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: mvn compile --no-transfer-progress

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run mvn test --no-transfer-progress

      # Windows & macOS — chạy thẳng, có màn hình sẵn
      - name: Build (Windows / macOS)
        if: runner.os != 'Linux'
        run: mvn compile --no-transfer-progress

      - name: Test (Windows / macOS)
        if: runner.os != 'Linux'
        run: mvn test --no-transfer-progress

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.os }}-jdk${{ matrix.java }}
          path: target/surefire-reports/
          retention-days: 7
